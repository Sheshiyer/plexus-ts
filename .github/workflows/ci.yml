name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: No-placeholder scan
        run: npm run release:scan-placeholders

      - name: Verify Electron fuse policy
        run: npm run verify:fuses

      - name: Production dependency audit
        run: npm run security:audit:prod

      - name: Release-chain dependency audit
        run: npm run security:audit:release

      - name: Verify renderer CSP
        run: npm run verify:csp

      - name: Verify release evidence policy
        run: npm run verify:release-evidence

      - name: Verify release candidate closeout
        run: npm run verify:release-candidate

      - name: Test all
        run: npm run test:all

      - name: Build main
        run: npm run build:main

      - name: Build preload
        run: npm run build:preload

      - name: Build renderer
        run: npm run build:renderer

      - name: Type check
        run: npm run typecheck

      - name: Smoke all
        run: npm run smoke:all
