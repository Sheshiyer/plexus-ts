name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: No-placeholder scan
        shell: bash
        run: |
          if rg -n -g '!docs/evidence/**' "Placeholder|Time engine|time engine|Time Tracker|fake repo|fake activity|fake biorhythm|fake breakwork|placeholder appraisal|Start a timer|Javi A\\. Torres|javicodes|Untitled|Admin Demo|demo-safe|emulation|probe pending|not scanned|No tasks yet|awaiting first cycle" src README.md package.json docs; then
            echo "::error::Release-blocking placeholder or old-brand string found"
            exit 1
          fi

      - name: Build main
        run: npm run build:main

      - name: Build preload
        run: npm run build:preload

      - name: Build renderer
        run: npm run build:renderer

      - name: Type check
        run: npx tsc --noEmit
