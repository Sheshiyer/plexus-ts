name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: No-placeholder scan
        run: npm run release:scan-placeholders

      - name: Verify Electron fuse policy
        run: npm run verify:fuses

      - name: Production dependency audit
        run: npm run security:audit:prod

      - name: Release-chain dependency audit
        run: npm run security:audit:release

      - name: Verify renderer CSP
        run: npm run verify:csp

      - name: Verify release evidence policy
        run: npm run verify:release-evidence

      - name: Verify release candidate closeout
        run: npm run verify:release-candidate

      - name: Test assistant
        run: npm run test:assistant
        timeout-minutes: 10

      - name: Test coworking
        run: npm run test:coworking
        timeout-minutes: 10

      - name: Test identity
        run: npm run test:identity
        timeout-minutes: 10

      - name: Test renderer
        run: npm run test:renderer
        timeout-minutes: 10

      - name: Build main
        run: npm run build:main

      - name: Build preload
        run: npm run build:preload

      - name: Build renderer
        run: npm run build:renderer

      - name: Type check
        run: npm run typecheck

      - name: Smoke all
        run: npm run smoke:all
