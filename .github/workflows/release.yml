name: Release Candidate

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: plexus-ota-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: Unsigned macOS arm64 candidate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Verify candidate tag and merged-main ancestry
        if: github.event_name == 'push'
        run: |
          node scripts/verify-release-ref.mjs \
            --mode publish \
            --event "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --sha "${GITHUB_SHA}" \
            --main-ref origin/main

      - name: Verify manual candidate metadata without publication authority
        if: github.event_name == 'workflow_dispatch'
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != 'refs/heads/main' ]; then
            echo '::error::Manual candidate must run from refs/heads/main.'
            exit 1
          fi
          git fetch --force origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            echo '::error::Manual candidate must match the current origin/main commit.'
            exit 1
          fi
          node scripts/verify-release-ref.mjs --mode build

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: No-placeholder scan
        run: npm run release:scan-placeholders

      - name: Production dependency audit
        run: npm run security:audit:prod

      - name: Full release dependency audit
        run: npm run security:audit:release

      - name: Test all
        run: npm run test:all

      - name: Verify renderer CSP
        run: npm run verify:csp

      - name: Verify release evidence policy
        run: npm run verify:release-evidence

      - name: Verify release candidate closeout
        run: npm run verify:release-candidate

      - name: Smoke all
        run: npm run smoke:all

      - name: Build unsigned macOS arm64 candidate
        run: npm run release:dry-run

      - name: Verify Electron fuses
        run: npm run verify:fuses -- --app auto

      - name: Show candidate artifacts
        run: ls -lah release

      - name: Upload candidate evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: plexus-macos-candidate-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
