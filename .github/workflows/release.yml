name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  macos:
    name: macOS signed release
    runs-on: macos-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Assert Apple signing secrets
        run: |
          missing=0
          for name in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: No-placeholder scan
        run: npm run release:scan-placeholders

      - name: Test all
        run: npm run test:all

      - name: Build signed macOS artifacts
        run: npm run release:mac

      - name: Verify Electron fuses
        run: npm run verify:fuses -- --app auto

      - name: Show release artifacts
        run: ls -lah release

      - name: Detect R2 OTA feed configuration
        id: r2
        shell: bash
        run: |
          missing=()
          for name in R2_ACCOUNT_ID R2_ACCESS_KEY_ID R2_SECRET_ACCESS_KEY R2_BUCKET; do
            if [ -z "${!name}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            message="R2 OTA secrets are missing: ${missing[*]}"
            if [[ "${GITHUB_REF:-}" == refs/tags/* ]]; then
              echo "::error::${message}. Tagged releases must publish the OTA feed."
              exit 1
            fi
            echo "::warning::${message}; signed artifacts were built but the OTA feed was not uploaded."
          fi

      - name: Upload OTA feed to Cloudflare R2
        if: steps.r2.outputs.enabled == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: true
        run: |
          python3 -m venv "$RUNNER_TEMP/awscli-venv"
          source "$RUNNER_TEMP/awscli-venv/bin/activate"
          python -m pip install --upgrade pip awscli
          aws s3 cp release/ "s3://${R2_BUCKET}/plexus/" \
            --recursive \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --exclude "*" \
            --include "*.dmg" \
            --include "*.zip" \
            --include "*.blockmap" \
            --include "latest*.yml" \
            --cache-control "public, max-age=60"

      - name: Verify public OTA feed
        if: steps.r2.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          feed_url="$(node -e "const pkg=require('./package.json'); console.log(String(pkg.build.publish[0].url).replace(/\\/+$/, '') + '/latest-mac.yml')")"
          local_body="$(cat release/latest-mac.yml)"

          extract_field() {
            printf '%s\n' "$1" | awk -v key="$2" -F': *' '$1 == key { print $2; exit }' | tr -d "\"'"
          }

          expected_version="$(node -p "require('./package.json').version")"
          expected_path="$(extract_field "$local_body" path)"
          expected_sha="$(extract_field "$local_body" sha512)"

          if [ -z "$expected_path" ] || [ -z "$expected_sha" ]; then
            echo "::error::release/latest-mac.yml is missing path or sha512."
            exit 1
          fi

          for attempt in 1 2 3 4 5 6; do
            echo "Checking public OTA feed (${attempt}/6): ${feed_url}"
            remote_body="$(curl -fsSL "$feed_url")"
            remote_version="$(extract_field "$remote_body" version)"
            remote_path="$(extract_field "$remote_body" path)"
            remote_sha="$(extract_field "$remote_body" sha512)"

            if [ "$remote_version" = "$expected_version" ] && [ "$remote_path" = "$expected_path" ] && [ "$remote_sha" = "$expected_sha" ]; then
              echo "Public OTA feed verified for ${expected_version}: ${remote_path}"
              exit 0
            fi

            echo "Feed not updated yet. version=${remote_version:-missing}, path=${remote_path:-missing}"
            sleep 10
          done

          echo "::error::Public OTA feed did not match release/latest-mac.yml for ${expected_version}."
          exit 1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plexus-macos-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml

      - name: Attach artifacts to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Plexus ${tag}"
          gh release upload "$tag" release/*.dmg release/*.zip release/*.blockmap release/latest*.yml --clobber
