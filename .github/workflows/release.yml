name: Release Candidate

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: plexus-ota-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  macos:
    name: Unsigned macOS arm64 candidate
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify candidate tag and merged-main ancestry
        run: |
          node scripts/verify-release-ref.mjs \
            --mode publish \
            --event "${GITHUB_EVENT_NAME}" \
            --ref "${GITHUB_REF}" \
            --sha "${GITHUB_SHA}" \
            --main-ref origin/main

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: No-placeholder scan
        run: npm run release:scan-placeholders

      - name: Production dependency audit
        run: npm run security:audit:prod

      - name: Full release dependency audit
        run: npm run security:audit:release

      - name: Test all
        run: npm run test:all

      - name: Verify renderer CSP
        run: npm run verify:csp

      - name: Verify release evidence policy
        run: npm run verify:release-evidence

      - name: Verify release candidate closeout
        run: npm run verify:release-candidate

      - name: Smoke all
        run: npm run smoke:all

      - name: Build unsigned macOS arm64 candidate
        run: npm run release:dry-run

      - name: Verify Electron fuses
        run: npm run verify:fuses -- --app auto

      - name: Show candidate artifacts
        run: ls -lah release

      - name: Upload candidate evidence
        uses: actions/upload-artifact@v4
        with:
          name: plexus-macos-candidate-${{ github.sha }}
          if-no-files-found: error
          retention-days: 7
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest*.yml
